[buildPlans.iosevka-custom]
family = "Iosevka Custom"
spacing = "normal"
serifs = "sans"
no-cv-ss = true

  [buildPlans.iosevka-custom.variants]
  inherits = "ss08"

    [buildPlans.iosevka-custom.variants.design]
    capital-z = "curly-serifless"
    f = "tailed-crossbar-at-x-height"
    g = "single-storey-flat-hook-serifless"
    z = "curly-serifless"
    turn-v = "curly"
    cyrl-capital-u = "curly"
    seven = "curly-serifless"
    ampersand = "closed"

  [buildPlans.iosevka-custom.ligations]
  inherits = "dlig"

[buildPlans.iosevka-custom.slopes.upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.iosevka-custom.slopes.italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"